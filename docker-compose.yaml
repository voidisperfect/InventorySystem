name: InventorySystem
services:
  # 1. The Database (Postgres)
  db_inventory:
    image: postgres:16
    container_name: db_inventory
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${INVENTORY_DATABASE_USER}
      - POSTGRES_PASSWORD=${INVENTORY_DATABASE_PASSWORD}
      - POSTGRES_DB=${INVENTORY_DATABASE_NAME}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVENTORY_DATABASE_USER} -d ${INVENTORY_DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservice_network

      # Second db for orders, to keep it separate from inventory
  db_orders:
    image: postgres:16
    container_name: db_orders
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${ORDERS_DATABASE_USER}
      - POSTGRES_PASSWORD=${ORDERS_DATABASE_PASSWORD}
      - POSTGRES_DB=${ORDERS_DATABASE_NAME}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDERS_DATABASE_USER} -d ${ORDERS_DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservice_network

  # 2. The Message Broker (Redpanda)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
      - --set redpanda.auto_create_topics_enabled=true
    ports:
      - "19092:19092" # For Windows tools (DBeaver/Kafka UI)
      - "9092:9092"   # For Django (internal/external mapping)
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - microservice_network

  # 3. The Web UI for Redpanda (Check it at http://localhost:8080)
  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda_console
    environment:
      KAFKA_BROKERS: "redpanda:9092"
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - microservice_network

  # 4. The Inventory Service (Django)
  inventory_service:
    build: 
      context: ./inventory_service
      dockerfile: Dockerfile
    container_name: inventory_service
    env_file:
      - .env
    volumes:
      - ./inventory_service:/app
    ports:
      - "8000:8000"
    depends_on:
      db_inventory:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - microservice_network

# 5. The Inventory Consumer (Background Worker)
  inventory_consumer:
    build: 
      context: ./inventory_service
      dockerfile: Dockerfile
    container_name: inventory_consumer
    command: python -u manage.py consume_orders
    env_file:
      - .env
    volumes:
      - ./inventory_service:/app
    depends_on:
      db_inventory:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: always
    networks:
      - microservice_network

  order_service:
      build: ./order_service
      container_name: order_service 
      ports:
        - "8001:8000" 
      volumes:
        - ./order_service:/app
      env_file:
        - .env
      environment:
        - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      depends_on:
        db_orders:
          condition: service_healthy
        redpanda:
          condition: service_healthy 
      networks:
        - microservice_network


networks:
  microservice_network:
    driver: bridge